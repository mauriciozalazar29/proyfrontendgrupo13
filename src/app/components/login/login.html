<div class="login-container d-flex justify-content-center align-items-center min-vh-100">
  <!-- Tarjeta Glass -->
  <div class="card glass-panel text-white p-5 shadow-lg border-0 rounded-4" style="max-width: 420px; width: 100%;">
    
    <div class="text-center mb-5">
      <div class="icon-container mb-3 mx-auto shadow-lg">
        <i class="fas fa-utensils fs-1 text-dark"></i>
      </div>
      <h2 class="fw-bold mb-1 letter-spacing-1">Acceso RestoYa</h2>
      <p class="text-muted small text-uppercase fw-semibold">Portal Administrativo</p>
    </div>

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
      
      <div class="mb-4 position-relative">
        <label for="email" class="form-label text-muted small fw-bold text-uppercase ms-1">Correo Electrónico</label>
        <div class="input-group">
          <span class="input-group-text bg-dark text-muted border-secondary border-opacity-50"><i class="fas fa-envelope"></i></span>
          <input type="email" class="form-control custom-input bg-dark text-white border-secondary border-opacity-50" id="email" 
                 formControlName="email" required placeholder="admin@restoya.com"
                 [ngClass]="{'is-invalid': loginForm.get('email')?.invalid && loginForm.get('email')?.touched}">
        </div>
        <div class="invalid-feedback d-block position-absolute" *ngIf="loginForm.get('email')?.invalid && loginForm.get('email')?.touched" style="bottom: -20px; font-size: 0.75rem;">
          <span *ngIf="loginForm.get('email')?.errors?.['required']">El correo es obligatorio.</span>
          <span *ngIf="loginForm.get('email')?.errors?.['email']">Debe ser un correo válido.</span>
        </div>
      </div>

      <div class="mb-5 position-relative">
        <label for="password" class="form-label text-muted small fw-bold text-uppercase ms-1">Contraseña</label>
        <div class="input-group">
          <span class="input-group-text bg-dark text-muted border-secondary border-opacity-50"><i class="fas fa-lock"></i></span>
          <input type="password" class="form-control custom-input bg-dark text-white border-secondary border-opacity-50" id="password" 
                 formControlName="password" required placeholder="********"
                 [ngClass]="{'is-invalid': loginForm.get('password')?.invalid && loginForm.get('password')?.touched}">
        </div>
        <div class="invalid-feedback d-block position-absolute" *ngIf="loginForm.get('password')?.invalid && loginForm.get('password')?.touched" style="bottom: -20px; font-size: 0.75rem;">
          <span *ngIf="loginForm.get('password')?.errors?.['required']">La contraseña es obligatoria.</span>
          <span *ngIf="loginForm.get('password')?.errors?.['minlength']">Mínimo 4 caracteres.</span>
        </div>
      </div>

      <button type="submit" class="btn btn-warning w-100 fw-bold py-3 text-dark rounded-3 shadow hover-scale mb-3 text-uppercase" [disabled]="loginForm.invalid || isLoading">
        <span *ngIf="isLoading" class="spinner-border spinner-border-sm me-2 text-dark" role="status" aria-hidden="true"></span>
        <i *ngIf="!isLoading" class="fas fa-sign-in-alt me-2"></i>
        {{ isLoading ? 'Autenticando...' : 'Iniciar Sesión' }}
      </button>

      <div *ngIf="errorMsg" class="alert alert-danger border-danger bg-danger bg-opacity-10 text-danger mt-3 text-center py-3 rounded-3" role="alert">
        <i class="fas fa-exclamation-circle me-2"></i>{{ errorMsg }}
      </div>

    </form>
  </div>
</div>
