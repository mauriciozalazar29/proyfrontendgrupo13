<div class="form-container">
  <div class="form-card">
    <div class="form-header">
      <h2>{{ isEdit ? 'Editar Usuario' : 'Nuevo Usuario' }}</h2>
      <button class="btn-close" (click)="cancelar()">
        <i class="fas fa-times"></i>
      </button>
    </div>

    <div class="loading-overlay" *ngIf="loading">
      <div class="spinner"></div>
    </div>

    <form (ngSubmit)="guardar()" #usuarioForm="ngForm" *ngIf="!loading">
      <div class="form-row">
        <div class="form-group">
          <label>Nombre *</label>
          <input type="text" name="nombre" [(ngModel)]="usuario.nombre" required placeholder="Ej: Juan">
        </div>
        <div class="form-group">
          <label>Apellido</label>
          <input type="text" name="apellido" [(ngModel)]="usuario.apellido" placeholder="Ej: Pérez">
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>DNI</label>
          <input type="text" name="dni" [(ngModel)]="usuario.dni" placeholder="Ej: 12345678">
        </div>
        <div class="form-group">
          <label>Email *</label>
          <input type="email" name="email" [(ngModel)]="usuario.email" required placeholder="correo@resto.com">
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>Contraseña <span *ngIf="!isEdit">*</span></label>
          <input type="password" name="password" [(ngModel)]="usuario.password" [required]="!isEdit" placeholder="********">
          <small class="help-text" *ngIf="isEdit">Deje en blanco para mantener la actual.</small>
        </div>
        
        <div class="form-group">
          <label>Rol Asignado</label>
          <select name="rolId" [(ngModel)]="usuario.rolId">
            <option [ngValue]="null">-- Sin Rol Principal --</option>
            <option *ngFor="let rol of roles" [ngValue]="rol.rolId">
              {{ rol.nombre }}
            </option>
          </select>
        </div>
      </div>

      <div class="form-actions">
        <button type="button" class="btn-danger" *ngIf="isEdit" (click)="eliminar()" [disabled]="saving">
          <i class="fas fa-trash"></i> Eliminar
        </button>
        <div class="right-actions">
          <button type="button" class="btn-secondary" (click)="cancelar()">Cancelar</button>
          <button type="submit" class="btn-primary" [disabled]="usuarioForm.invalid || saving">
            <i class="fas fa-save" *ngIf="!saving"></i>
            <i class="fas fa-spinner fa-spin" *ngIf="saving"></i>
            {{ saving ? 'Guardando...' : 'Guardar' }}
          </button>
        </div>
      </div>
    </form>
  </div>
</div>
