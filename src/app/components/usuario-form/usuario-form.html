<div class="container-fluid py-5 min-vh-100 d-flex justify-content-center align-items-start" style="background-color: #121212;">
  
  <div class="card glass-panel text-white border-0 rounded-4 shadow-lg w-100 mt-md-4" style="max-width: 800px;">
    
    <!-- Header -->
    <div class="card-header border-bottom border-secondary border-opacity-25 p-4 d-flex justify-content-between align-items-center">
      <h3 class="fw-bold mb-0 text-white d-flex align-items-center">
        <i class="fas fa-user-edit text-warning me-3"></i> 
        {{ isEdit ? 'Editar Perfil del Usuario' : 'Registrar Nuevo Usuario' }}
      </h3>
      <button class="btn btn-dark rounded-circle text-muted hover-scale" style="width: 40px; height: 40px;" (click)="cancelar()">
        <i class="fas fa-times fs-5"></i>
      </button>
    </div>

    <!-- Spinner -->
    <div class="p-5 text-center" *ngIf="loading">
      <div class="spinner-border text-warning mb-3" role="status" style="width: 3rem; height: 3rem;"></div>
      <h5 class="fw-light text-muted">Cargando datos del usuario...</h5>
    </div>

    <!-- Formulario -->
    <div class="card-body p-4 p-md-5" *ngIf="!loading">
      <form (ngSubmit)="guardar()" #usuarioForm="ngForm">
        
        <div class="row g-4">
          <!-- Columna Izquierda -->
          <div class="col-md-6">
            <h5 class="text-warning mb-4 fw-semibold border-bottom border-secondary border-opacity-25 pb-2">Información Personal</h5>
            
            <div class="mb-3">
              <label class="form-label text-muted small text-uppercase fw-bold letter-spacing-1">Nombre <span class="text-danger">*</span></label>
              <div class="input-group">
                <span class="input-group-text bg-dark text-muted border-secondary border-opacity-50"><i class="fas fa-user"></i></span>
                <input type="text" name="nombre" class="form-control custom-input bg-dark text-white border-secondary border-opacity-50" 
                       [(ngModel)]="usuario.nombre" required placeholder="Ej: Juan">
              </div>
            </div>

            <div class="mb-3">
              <label class="form-label text-muted small text-uppercase fw-bold letter-spacing-1">Apellido</label>
              <div class="input-group">
                <span class="input-group-text bg-dark text-muted border-secondary border-opacity-50"><i class="far fa-user"></i></span>
                <input type="text" name="apellido" class="form-control custom-input bg-dark text-white border-secondary border-opacity-50" 
                       [(ngModel)]="usuario.apellido" placeholder="Ej: Pérez">
              </div>
            </div>

            <div class="mb-3">
              <label class="form-label text-muted small text-uppercase fw-bold letter-spacing-1">DNI</label>
              <div class="input-group">
                <span class="input-group-text bg-dark text-muted border-secondary border-opacity-50"><i class="fas fa-id-card"></i></span>
                <input type="text" name="dni" class="form-control custom-input bg-dark text-white border-secondary border-opacity-50" 
                       [(ngModel)]="usuario.dni" placeholder="Ej: 12345678">
              </div>
            </div>
          </div>

          <!-- Columna Derecha -->
          <div class="col-md-6">
            <h5 class="text-warning mb-4 fw-semibold border-bottom border-secondary border-opacity-25 pb-2">Credenciales y Rol</h5>
            
            <div class="mb-3">
              <label class="form-label text-muted small text-uppercase fw-bold letter-spacing-1">Correo Electrónico <span class="text-danger">*</span></label>
              <div class="input-group">
                <span class="input-group-text bg-dark text-muted border-secondary border-opacity-50"><i class="fas fa-envelope"></i></span>
                <input type="email" name="email" class="form-control custom-input bg-dark text-white border-secondary border-opacity-50" 
                       [(ngModel)]="usuario.email" required placeholder="correo@restoya.com">
              </div>
            </div>

            <div class="mb-3">
              <label class="form-label text-muted small text-uppercase fw-bold letter-spacing-1">Contraseña <span *ngIf="!isEdit" class="text-danger">*</span></label>
              <div class="input-group mb-1">
                <span class="input-group-text bg-dark text-muted border-secondary border-opacity-50"><i class="fas fa-key"></i></span>
                <input type="password" name="password" class="form-control custom-input bg-dark text-white border-secondary border-opacity-50" 
                       [(ngModel)]="usuario.password" [required]="!isEdit" placeholder="********">
              </div>
              <small class="text-info fw-semibold" *ngIf="isEdit"><i class="fas fa-info-circle me-1"></i>Deje en blanco para mantener la actual.</small>
            </div>
            
            <div class="mb-3">
              <label class="form-label text-muted small text-uppercase fw-bold letter-spacing-1">Rol Asignado</label>
              <div class="input-group">
                <span class="input-group-text bg-dark text-muted border-secondary border-opacity-50"><i class="fas fa-shield-alt"></i></span>
                <select class="form-select custom-input bg-dark text-white border-secondary border-opacity-50" name="rolId" [(ngModel)]="usuario.rolId">
                  <option [ngValue]="null">-- Sin Rol Principal --</option>
                  <option *ngFor="let rol of roles" [ngValue]="rol.rolId">{{ rol.nombre }}</option>
                </select>
              </div>
            </div>
          </div>
        </div>

        <!-- Footer / Botones -->
        <div class="d-flex flex-column flex-md-row justify-content-between align-items-center mt-5 pt-4 border-top border-secondary border-opacity-25 gap-3">
          
          <button type="button" class="btn btn-outline-danger px-4 py-2 hover-scale rounded-3 fw-bold w-100 w-md-auto" *ngIf="isEdit" (click)="eliminar()" [disabled]="saving">
            <i class="fas fa-trash-alt me-2"></i> Eliminar Usuario
          </button>
          <div *ngIf="!isEdit" class="d-none d-md-block"></div> <!-- Spacer -->

          <div class="d-flex flex-column flex-md-row gap-2 w-100 w-md-auto">
            <button type="button" class="btn btn-dark border-secondary px-4 py-2 hover-scale rounded-3 fw-bold" (click)="cancelar()">
              Cancelar
            </button>
            <button type="submit" class="btn btn-warning text-dark px-5 py-2 hover-scale rounded-3 fw-bold shadow-sm" [disabled]="usuarioForm.invalid || saving">
              <span *ngIf="saving" class="spinner-border spinner-border-sm me-2 text-dark" role="status"></span>
              <i *ngIf="!saving" class="fas fa-save me-2"></i>
              {{ saving ? 'Guardando...' : 'Guardar Cambios' }}
            </button>
          </div>
        </div>

      </form>
    </div>
  </div>
</div>
