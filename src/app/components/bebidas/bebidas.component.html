<div class="container py-5">
    <div class="row">
        <div class="col-12 col-md-6 col-lg-4 d-flex" *ngFor="let b of bebidas">
            <div class="card bg-dark text-white w-100">
                <img [src]="b.imagenUrl" class="card-img-top" alt="imagenes">
                <div class="card-body d-flex flex-column">
                    <h5 class="card-title fw-bold">{{b.nombre}}</h5>
                    <p class="card-text text">{{b.categoria}}</p>
                    <div class="d-flex justify-content-between align-items-center ms-auto">
                        <h6 class="card-text">{{b.precio | currency}}</h6>
                        <button (click)="agregarAlCarrito(b)"
                            class="btn btn-outline-light rounded-pill d-flex align-items-center justify-content-center">
                            <span class="material-symbols-outlined">add</span>
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
