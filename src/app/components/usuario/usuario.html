<div class="user-management-container">
  <div class="header-actions">
    <h2>Gestión de Usuarios</h2>
    <button class="btn-primary" (click)="crearUsuario()">
      <i class="fas fa-plus"></i> Nuevo Usuario
    </button>
  </div>

  <div class="table-container" *ngIf="!loading; else spinner">
    <table class="users-table">
      <thead>
        <tr>
          <th>Nombre</th>
          <th>DNI</th>
          <th>Email</th>
          <th>Rol</th>
          <th>Acciones</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let user of usuarios">
          <td>{{ user.nombre }} {{ user.apellido }}</td>
          <td>{{ user.dni }}</td>
          <td>{{ user.email }}</td>
          <td>
            <span class="role-badge" *ngFor="let rol of user.Rols">
              {{ rol.nombre }}
            </span>
            <span class="role-badge empty" *ngIf="!user.Rols || user.Rols.length === 0">
              Sin Rol
            </span>
          </td>
          <td class="actions-cell">
            <button class="btn-icon edit" (click)="editarUsuario(user.usuarioId)" title="Editar">
              <i class="fas fa-pen"></i> Editar
            </button>
            <button class="btn-icon delete" (click)="eliminarUsuario(user.usuarioId)" title="Eliminar">
              <i class="fas fa-trash"></i>
            </button>
          </td>
        </tr>
        <tr *ngIf="usuarios.length === 0">
          <td colspan="5" class="empty-state">No hay usuarios registrados.</td>
        </tr>
      </tbody>
    </table>
  </div>

  <ng-template #spinner>
    <div class="loading-state">
      <div class="spinner"></div>
      <p>Cargando usuarios...</p>
    </div>
  </ng-template>
</div>
