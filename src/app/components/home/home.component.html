<div class="landing-container d-flex align-items-center justify-content-center text-center">
    <div class="hero-content p-5 rounded-4 shadow-lg text-white">
        <h1 class="display-3 fw-bold mb-3 title-glow">RestoYa Delivery</h1>
        <p class="lead mb-4 fs-4">Las mejores hamburguesas y pizzas, directo a tu puerta.</p>
        <button class="btn btn-warning btn-lg rounded-pill px-5 py-3 fw-bold shadow pulse-btn" (click)="hacerPedido()">
            <i class="fas fa-motorcycle me-2"></i> VER MENÚ Y PEDIR
        </button>

        <!-- Widget del Clima en Home -->
        <div class="mt-5 pt-3 border-top border-secondary border-opacity-50">
            <div *ngIf="clima" class="d-flex flex-column align-items-center justify-content-center animate__animated animate__fadeIn">
                <div class="d-flex align-items-center gap-2 mb-1">
                    <span class="material-symbols-outlined text-warning" style="font-size: 2.5rem;">{{iconoClima}}</span>
                    <h2 class="mb-0 fw-light" style="font-size: 2.5rem;">{{clima.temperature}}°C</h2>
                </div>
                <div class="text-white-50">San Salvador de Jujuy</div>
                <div class="badge bg-dark border border-secondary text-light px-3 py-2 mt-2 rounded-pill shadow-sm" style="font-size: 0.9rem;">
                    {{descripcionClima}}
                </div>
            </div>
            
            <div *ngIf="!clima" class="text-white-50 small mt-3">
                <div class="spinner-grow spinner-grow-sm text-warning me-2" role="status"></div>
                Sincronizando clima local...
            </div>
        </div>
    </div>
</div>
